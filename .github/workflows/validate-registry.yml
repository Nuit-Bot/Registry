name: Validate Registry

on:
    pull_request:
        paths:
            - registry.json

jobs:
    validate:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Validate registry
              id: validate
              continue-on-error: true
              run: bun run validate-registry

            - name: Generate comment body
              run: |
                  node <<'EOF'
                  const fs = require('fs');

                  let body = '<!-- nuit-registry-validation -->\n';

                  try {
                    const report = JSON.parse(
                      fs.readFileSync('validation-report.json', 'utf8')
                    );

                    if (report.success) {
                      body += '## Registry Validation\n\n✅ Validation passed.';
                    } else {
                      body += '## Registry Validation\n\n❌ Validation failed.\n';

                      for (const [pkg, errors] of Object.entries(report.modules)) {
                        body += `\n### ${pkg}\n`;

                        for (const error of errors) {
                          body += `- ${error}\n`;
                        }
                      }
                    }
                  } catch {
                    body +=
                      '## Registry Validation\n\n❌ Validation failed unexpectedly.';
                  }

                  fs.writeFileSync('comment.md', body);
                  EOF

            - name: Create or update PR comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');

                      const body = fs.readFileSync('comment.md', 'utf8');

                      const comments =
                        await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                        });

                      const existing = comments.data.find(
                        comment =>
                          comment.body &&
                          comment.body.includes(
                            '<!-- nuit-registry-validation -->'
                          )
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Fail workflow if validation failed
              if: steps.validate.outcome == 'failure'
              run: exit 1
